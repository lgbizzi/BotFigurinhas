services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      # Superusuário interno do container (usado apenas na inicialização)
      POSTGRES_DB:            ${POSTGRES_DB}
      POSTGRES_USER:          ${POSTGRES_ADMIN_USER}
      POSTGRES_PASSWORD:      ${POSTGRES_ADMIN_PASSWORD}
      # Credenciais da aplicação — repassadas ao script de init (00_setup.sh)
      POSTGRES_APP_USER:      ${POSTGRES_USER}
      POSTGRES_APP_PASSWORD:  ${POSTGRES_PASSWORD}
      POSTGRES_SCHEMA:        ${POSTGRES_SCHEMA}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Script de inicialização: cria schema, role e aplica migrations
      - ./database/homelab_init:/docker-entrypoint-initdb.d/
      # Migrations montadas separadamente para o script de init acessar
      - ./database/migrations:/migrations/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_ADMIN_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
